---
modules:
  - type: dnf
    repos:
      copr:
        - ashbuk/Hyprland-Fedora
    install:
      install-weak-deps: false
      packages:
        - hyprland
        - xdg-desktop-portal-hyprland

  - type: files
    files:
      - source: wm/hypr
        destination: /

  - type: script
    snippets:
      - "chmod +x /usr/bin/start-hyprland-session"
      - "rm -f /usr/share/wayland-sessions/hyprland-uwsm.desktop"
