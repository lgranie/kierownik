---
modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - lionheartp/Hyprland
    install:
      install-weak-deps: false
      packages:
        - hypridle
        - hyprland
        - hyprland-guiutils
        - hyprlock
        - xdg-desktop-portal-hyprland

  - type: files
    files:
      - source: wm/hypr
        destination: /

  - type: script
    snippets:
      - "chmod +x /usr/bin/start-hyprland-session"
      - "rm -f /usr/share/wayland-sessions/hyprland-uwsm.desktop"
