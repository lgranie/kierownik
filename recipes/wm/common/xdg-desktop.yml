---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - dbus-broker
        - gnome-keyring
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - xdg-utils

  - type: systemd
    user:
      enabled:
        - dbus-broker
        - gnome-keyring-daemon
