---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - iio-sensor-proxy

  - type: dnf
    repos:
      cleanup: true
      copr:
        - ersen/my-little-copr
    install:
      install-weak-deps: false
      packages:
        - wvkbd
  
  - type: files
    files:
      - source: wm/common/5290
        destination: /
  
  - type: script
    snippets:
      - "chmod +x /usr/bin/start-wvkbd"

  - type: systemd
    user:
      enabled:
        - wvkbd.service
