---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - alsa-firmware
        - alsa-lib
        - pipewire
        - pipewire-alsa
        - pipewire-pulseaudio
        - wireplumber
  
  - type: files
    files:
      - source: wm/common/audio
        destination: /
