---
modules:
  - type: script
    scripts:
      - wm/common/voxtype/install

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - ydotool

  - type: files
    files:
      - source: wm/common/voxtype
        destination: /

  - type: systemd
    system:
      masked:
        - voxtype
...
