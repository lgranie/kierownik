---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - avahi
        - cups
        - cups-filters
        - system-config-printer
        - system-config-printer-udev

  - type: files
    files:
      - source: wm/common/printer
        destination: /

  - type: systemd
    system:
      disabled:
        - avahi-daemon.service
        - avahi-daemon.socket
        - cups.service
        - cups.socket