---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - flatpak
        - flatpak-spawn
  
  - type: files
    files:
      - source: wm/common/flatpak
        destination: /

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false # Send notification after install/uninstall is finished (true/false)
        repo:
          url: https://flathub.org/repo/flathub.flatpakrepo
          name: flathub
          title: Flathub
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - com.vscodium.codium
          - io.github.kolunmi.Bazaar
          - org.localsend.localsend_app
      - scope: user # Also add Flathub user repo, but no user packages
        notify: false
        repo:
          url: https://flathub.org/repo/flathub.flatpakrepo
          name: flathub
          title: Flathub

  - type: systemd
    system:
      enabled:
        - flatpak-default_config.service
        - flatpak-update.timer