---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - wayvnc

  - type: files
    files:
      - source: wm/common/wayvnc
        destination: /

  - type: systemd
    user:
      enabled:
        - wayvnc.socket

  - type: script
    snippets:
      - "firewall-cmd --add-port=5900-5910/tcp"
      - "firewall-cmd --runtime-to-permanent"
