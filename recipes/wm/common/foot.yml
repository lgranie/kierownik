---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - foot
        - xdg-terminal-exec

  - type: files
    files:
      - source: wm/common/foot
        destination: /

  - type: systemd
    user:
      enabled:
        - foot-server.socket

  - type: script
    snippets:
      - "echo 'NoDisplay=true' >> /usr/share/applications/foot-server.desktop"
