---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - greetd
        - tuigreet
  
  - type: files
    files:
      - source: wm/common/greetd
        destination: /

  - type: systemd
    system:
      enabled:
        - display-manager.service
        - greetd.service
        
