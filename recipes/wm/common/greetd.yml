---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - greetd
        - tuigreet
  
  - type: files
    files:
      - source: wm/common/greetd
        destination: /

  - type: systemd
    system:
      enabled:
        - greetd

  - type: script
    snippets:
      - "mkdir -p /var/cache/tuigreet"
      - "chown -R greetd:greetd /var/cache/tuigreet"
