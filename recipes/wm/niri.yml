---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - niri
        - swayidle
        - swaylock

  - type: files
    files:
      - source: wm/niri
        destination: /

  - type: script
    snippets:
      - "chmod +x /usr/bin/start-niri"
      - "chmod +x /usr/bin/start-niri-session"
