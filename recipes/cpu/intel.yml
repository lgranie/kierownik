modules:
  - type: dnf
    remove:
      auto-remove: true
      packages:
        - amd-gpu-firmware
        - amd-ucode-firmware

  - type: files
    files:
      - source: cpu/intel
        destination: /

  - type: kargs
    arch: x86_64
    kargs:
      - intel_idle.max_cstate=2
      - intel_iommu=on
      - intel_pstate=active
      - i915.disable_power_well=1
      - i915.enable_dc=4
      - i915.enable_fbc=1
      - i915.enable_guc=2
      - i915.enable_psr=2
