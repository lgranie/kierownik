---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: kierownik-wm
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: latest # latest is also supported if you want new updates ASAP
# base-image: quay.io/fedora/fedora-bootc
# image-version: 43

stages:
  - name: rust_builder
    from: docker.io/library/rust:latest
    modules:
      - type: script
        no-cache: true
        snippets:
          - curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          - cargo binstall bluetui --disable-telemetry --install-path /tmp/rust_builder
          - cargo binstall impala  --disable-telemetry --install-path /tmp/rust_builder

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - from-file: base/all.yml
  
  - from-file: wm/common/all.yml
  - from-file: wm/hypr.yml
  - from-file: wm/niri.yml

  - type: copy
    from: rust_builder
    src: /tmp/rust_builder 
    dest: /usr/bin

  # finalize
  - from-file: common/finalize.yml
