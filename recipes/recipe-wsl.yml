---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: kierownik-wsl
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
#base-image: ghcr.io/blue-build/base-images/fedora-base
#image-version: latest # latest is also supported if you want new updates ASAP
base-image: quay.io/fedora/fedora
image-version: 44

platforms:
  - linux/amd64

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - from-file: wsl/all.yml
  
  - from-file: wm/common/brave.yml
  - from-file: wm/common/audio.yml
  - from-file: wm/common/firewall.yml
  - from-file: wm/common/flatpak.yml
  - from-file: wm/common/foot.yml
  - from-file: wm/common/noctalia-shell.yml
  - from-file: wm/common/printer.yml
  - from-file: wm/common/sunshine.yml
  - from-file: wm/common/waydroid.yml
  - from-file: wm/common/wayland-wm.yml
  - from-file: wm/common/wl-tools.yml
  - from-file: wm/common/xdg-desktop.yml
  - from-file: wm/niri.yml

  # finalize
  - from-file: common/container.yml