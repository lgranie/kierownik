---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: krw-5290
# description will be included in the image's metadata
description: This is my personal OS image. Hyprland on a Dell Latitude 5290 2in1.

# the base image to build on top of (FROM) and the version tag to use
base-image: quay.io/fedora/fedora-bootc
image-version: 44

platforms:
  - linux/amd64

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - from-file: base/all.yml
  - from-file: base/wifi.yml
  - from-file: cpu/intel.yml
  - from-file: cpu/realtime.yml
  
  - from-file: wm/base.yml
  - from-file: wm/desktop.yml
  - from-file: wm/hypr.yml
  - from-file: wm/common/2in1.yml

  # finalize
  - from-file: common/all.yml
