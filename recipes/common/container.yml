---
modules:
  - type: os-release
    properties:
      ID: kierownik
      ID_LIKE: fedora
      NAME: Kierownik
      PRETTY_NAME: Kierownik
      DEFAULT_HOSTNAME: kierownik
      HOME_URL: https://github.com/lgranie/kierownik
      DOCUMENTATION_URL: https://github.com/lgranie/kierownik
      BUG_REPORT_URL: https://github.com/lgranie/kierownik/issues

  - type: script
    snippets:
      - "rm -rf /etc/skel/.{bash,mozilla}*"

  - from-file: common/removesuid.yml
  