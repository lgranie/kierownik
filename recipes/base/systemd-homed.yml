---
modules:
  - type: systemd
    system:
      enabled:
        - systemd-homed
  
  - type: script
    snippets:
      - "authselect select local with-systemd-homed with-faillock without-nullok"
      - "authselect apply-changes"
      - "sed -i 's|^# minlen = 8|minlen = 6|' /etc/security/pwquality.conf"
