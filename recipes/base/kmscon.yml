---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - kmscon
        - kmscon-gl
        - kmscon-pango

  - type: files
    files:
      - source: base/kmscon
        destination: /

  - type: script
    snippets:
      - "ln -s /usr/lib/systemd/system/kmsconvt@.service /etc/systemd/system/autovt@.service"
