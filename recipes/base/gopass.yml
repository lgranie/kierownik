---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - gopass
        - gopass-jsonapi

  - type: files
    files:
      - source: base/gopass
        destination: /

  - type: script
    snippets:
      - "gopass completion fish > /etc/fish/completions/gopass.fish"
      