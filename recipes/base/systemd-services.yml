---
modules:
  - type: systemd
    system:
      masked:
        - dnf-makecache.service
        - dnf-makecache.timer
        - raid-check.service
        - raid-check.timer
        - rpm-ostreed-automatic.timer
        - rpm-ostree-countme.service
        - rpm-ostree-countme.timer
        - sshd.service
        - sshd.socket
      enabled:
        - bootc-fetch-apply-updates.timer
        - bootc-update-check.timer
        - firstboot
    user:
      enabled:
        - dotfiles-init.service
        - podman.socket
