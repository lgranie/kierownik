---
modules:
  - from-file: common/clean.yml
  - from-file: base/dotfiles.yml
  - from-file: base/fish.yml
  - from-file: base/kmscon.yml
  - from-file: base/plymouth.yml
  - from-file: base/tools.yml

  - type: files
    files:
      - source: base/system
        destination: / # copies files/base/* (* means everything inside it) into your image's root folder /

  - type: systemd
    system:
      enabled:
        - firstboot
        - systemd-homed

  - type: kargs
    arch: x86_64
    kargs:
      - console=ttyS0,114800n8
      - quiet splash
      - amd_iommu=on iommu=pt

