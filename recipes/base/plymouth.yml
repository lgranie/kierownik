---
modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - plymouth-theme-spinner
      exclude:
        - fedora-logos

  - type: script
    snippets:
      - "plymouth-set-default-theme spinner"
  
  - type: kargs
    arch: x86_64
    kargs:
      - quiet splash rhgb
      - plymouth.use-simpledrm=0
