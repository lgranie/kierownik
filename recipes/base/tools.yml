---
modules:
  - type: files
    files:
      - source: base/tools
        destination: /

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - bat
        - btop
        - delta
        - fd
        - fish
        - gcc
        - git
        - gum
        - jq
        - lsd
        - make
        - neovim
        - openssh
        - ripgrep
        - stow
        - tar
        - tmux
        - yq
        - zoxide
        - zstd

  - type: dnf
    repos:
      cleanup: true
      copr:
        - jdxcode/mise
    install:
      install-weak-deps: false
      packages:
        - mise

  - type: script
    scripts:
      - base/non-packaged-tools

  - type: script
    snippets:
      - "sed -i 's|^SHELL=.*|SHELL=/usr/bin/fish|' /etc/default/useradd"

  - type: script
    snippets:
      - "mise activate fish > /etc/fish/conf.d/90-mise.fish"
      - "tv init fish > /etc/fish/conf.d/90-tv.fish"
      - "zoxide init --cmd cd fish > /etc/fish/conf.d/90-zoxide.fish"
      - "bat --completion fish > /etc/fish/completions/bat.fish"
      - "delta --generate-completion fish > /etc/fish/completions/delta.fish"
      - "gum completion fish > /etc/fish/completions/gum.fish"
      - "sesh completion fish > /etc/fish/completions/sesh.fish"
      - "yq completion fish > /etc/fish/completions/yq.fish"
