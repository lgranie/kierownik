name: Build disk image

on:
  workflow_dispatch:
  schedule:
    - cron:
        "00 08 * * 6" # build at 08:00 UTC every saturday
        # (1 hour after last ublue image start building)

env:
  IMAGE_NAME: "krw"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

jobs:
  build_release:

    name: Build and upload disk image

    strategy:
      fail-fast: false
      matrix:
        flavor: ["5290", "8745"]

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read
      id-token: write

    timeout-minutes: 60

    steps:
      - name: Change image name depending on build flavor
        env:
          BUILD_FLAVOR: ${{ matrix.flavor }}
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME}-${{ matrix.flavor }}" >> $GITHUB_ENV
          
      - name: Lower case image variables
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zstd curl uuid-runtime

      - name: Mount BTRFS for podman storage 
        id: container-storage-action 
        uses: ublue-os/container-storage-action@911baca08baf30c8654933e9e9723cb399892140 
        continue-on-error: true 
        with: 
          target-dir: /var/lib/containers 
          mount-opts: compress-force=zstd:2

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: ${{ env.IMAGE_NAME}}
          image_repo: ${{ env.IMAGE_REGISTRY}}
          image_tag: latest
          version: ${{ env.VERSION }}
          variant: Kinoite
          iso_name: ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.iso

      # This example is for uploading your ISO as a Github artifact. You can do something similar using any cloud storage, so long as you copy the output
      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 0
          compression-level: 0