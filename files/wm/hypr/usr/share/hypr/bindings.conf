# 0. Keybind Cheatsheet
bind = $mod, QUESTIONMARK, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle #"Keybind Cheatsheet"

# Unified clipboard (Super+C/V/X works everywhere)
bind = SUPER, C, exec, wl-copy
bind = SUPER, X, exec, wl-copy && hyprctl dispatch killactive
bind = SUPER, V, exec, wl-paste
bind = SUPER CTRL, V, exec, cliphist decode | wl-paste

# 1. Applications
bind = $mod, RETURN, exec, footclient #"Open a Terminal: foot client"
bind = $mod SHIFT, RETURN, exec, foot #"Open a Terminal: foot"
bind = $mod, SPACE, exec, qs -c noctalia-shell ipc call launcher toggle #"Run an Application: Menu"
bind = $mod, B, exec, qs -c noctalia-shell ipc call plugin:bookmarks toggle #"Open Bookmark"
bind = $mod ALT, L, exec, swaylock #"Lock the Screen: swaylock"

# 2. Window Management
bind = $mod, W, killactive, #"Close window"
bind = $mod, F, fullscreen, 1 #"Full width"
bind = $mod ALT, F, fullscreen, 0 #"Full screen"
bind = $mod, T, togglefloating, #"Toggle window floating/tiling"
bind = $mod CTRL, F, fullscreenstate, 0 2 #"Tiled full screen"

# 3. Workspace Navigation
bind = $mod, LEFT, movefocus, l #"Move window focus left"
bind = $mod, RIGHT, movefocus, r #"Move window focus right"
bind = $mod, UP, workspace, e+1 #"Next workspace"
bind = $mod, DOWN, workspace, e-1 #"Previous workspace"

# 4. Move to Monitor
bind = $mod SHIFT ALT, LEFT, movecurrentworkspacetomonitor, l #"Move workspace to left monitor"
bind = $mod SHIFT ALT, RIGHT, movecurrentworkspacetomonitor, r #"Move workspace to right monitor"
bind = $mod SHIFT ALT, UP, movecurrentworkspacetomonitor, u #"Move workspace to up monitor"
bind = $mod SHIFT ALT, DOWN, movecurrentworkspacetomonitor, d #"Move workspace to down monitor"

# 5. Swap Windows
bind = $mod SHIFT, LEFT, swapwindow, l #"Swap window to the left"
bind = $mod SHIFT, RIGHT, swapwindow, r #"Swap window to the right"
bind = $mod SHIFT, UP, swapwindow, u #"Swap window up"
bind = $mod SHIFT, DOWN, swapwindow, d #"Swap window down"

# 6. Resize
bind = $mod, code:20, resizeactive, -100 0 #"Expand window left"
bind = $mod, code:21, resizeactive, 100 0 #"Shrink window left"
bind = $mod SHIFT, code:20, resizeactive, 0 -100 #"Shrink window up"
bind = $mod SHIFT, code:21, resizeactive, 0 100 #"Expand window down"

# 7. Groups
bind = $mod, G, togglegroup #"Toggle window grouping"
bind = $mod ALT, G, moveoutofgroup #"Move active window out of group"
bind = $mod ALT, LEFT, moveintogroup, l #"Move window to group on left"
bind = $mod ALT, RIGHT, moveintogroup, r #"Move window to group on right"
bind = $mod ALT, UP, moveintogroup, u #"Move window to group on top"
bind = $mod ALT, DOWN, moveintogroup, d #"Move window to group on bottom"
bind = $mod ALT, TAB, changegroupactive, f #"Next window in group"
bind = $mod ALT SHIFT, TAB, changegroupactive, b #"Previous window in group"
bind = $mod CTRL, LEFT, changegroupactive, b #"Move grouped window focus left"
bind = $mod CTRL, RIGHT, changegroupactive, f #"Move grouped window focus right"

# 8. System
bind = $mod SHIFT, E, exit, #"Exit Hyprland"

# 9. Hyprland Specific
bind = $mod, S, togglespecialworkspace, scratchpad #"Toggle scratchpad"
bind = $mod ALT, S, movetoworkspacesilent, special:scratchpad #"Move window to scratchpad"